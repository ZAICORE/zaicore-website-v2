name: chat-health

# Polls the chat dock every 15 minutes. The endpoint itself emails Zachary via
# Resend; this workflow failing is the backstop for the case where the site is
# too broken to send its own mail (GitHub emails you on a failed scheduled run).
#
# On 2026-07-14 both configured models were deprecated by OpenRouter on the same
# day and the dock returned an error to every visitor, silently, until someone
# happened to try it. This exists so that cannot happen twice.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: # lets you run it on demand from the Actions tab

concurrency:
  group: chat-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # `main` is pushed to both ZAICORE/zaicore-website-v2 and
    # ZAICORE/zaicore-website. Without this guard the check would run twice and
    # alert twice. v2 owns it.
    if: github.repository == 'ZAICORE/zaicore-website-v2'
    steps:
      - name: Probe chat dock health
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set in this repo's Actions secrets."
            exit 1
          fi

          code=$(curl -sSL -o /tmp/health.json -w '%{http_code}' \
            --max-time 90 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://zaicore.com/api/cron/chat-health || echo "000")

          echo "HTTP $code"
          cat /tmp/health.json 2>/dev/null || echo "(no body)"
          echo

          # 000 = the request never completed: the site itself is unreachable.
          if [ "$code" = "000" ]; then
            echo "::error::zaicore.com is unreachable — the site itself may be down."
            exit 1
          fi

          if [ "$code" = "503" ]; then
            echo "::error::Chat dock is DOWN — no configured model is responding."
            exit 1
          fi

          if [ "$code" != "200" ]; then
            echo "::error::Health check returned HTTP $code (expected 200). Check CRON_SECRET is set in Vercel."
            exit 1
          fi

          # Degraded = still serving visitors, but a model is failing or has been
          # deprecated. The endpoint emails about it; we surface a warning rather
          # than failing, so that a genuine outage stays the only red run.
          if grep -q '"status":"degraded"' /tmp/health.json; then
            echo "::warning::Chat dock is DEGRADED — a model is failing or deprecated. See the alert email."
          else
            echo "Chat dock healthy."
          fi
